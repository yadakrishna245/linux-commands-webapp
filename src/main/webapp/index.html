<!DOCTYPE html>
<html>
<head>
    <title>Linux Commands</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>🐧 Linux Commands Cheat Sheet</h1>

    <div class="card">
        <h2>File Commands</h2>
        <ul>
            <li>ls - list files</li>
            <li>cd - change directory</li>
            <li>pwd - current directory</li>
        </ul>
    </div>

    <div class="card">
        <h2>System Commands</h2>
        <ul>
            <li>top - processes</li>
            <li>df -h - disk usage</li>
            <li>free -m - memory</li>
        </ul>
    </div>

</body>
</html>
